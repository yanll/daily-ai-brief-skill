# API数据源配置
api_sources:
  - name: "GitHub Trending API"
    type: "github"
    endpoint: "https://api.github.com/search/repositories?q=ai+language:python&sort=stars&order=desc"
    params:
      per_page: 10
    enabled: true
    priority: 2
    num_items: 8

  - name: "Hacker News API"
    type: "hackernews"
    endpoint: "https://hacker-news.firebaseio.com/v0/topstories.json"
    params: {}
    enabled: true
    priority: 1
    num_items: 10

  - name: "Papers With Code API"
    type: "generic"
    endpoint: "https://paperswithcode.com/api/v1/papers/"
    params:
      ordering: "-published"
      limit: 10
    enabled: true
    priority: 2
    num_items: 8

# 数据获取配置
fetch_config:
  max_items_per_source: 15
  timeout_seconds: 30
  user_agent: "AI-Daily-Brief/2.0 (+https://github.com/ai-daily-brief)"

  max_retries: 2
  retry_delay_seconds: 2

  min_content_length: 20
  max_content_length: 800
  exclude_keywords:
    - "sponsored"
    - "advertisement"
    - "click here"
    - "buy now"
    - "广告"
    - "推广"

  preferred_languages:
    - "zh"
    - "en"

  max_age_hours: 72

# 搜索关键词矩阵（来自source.bak）
search_keywords:
  newsletter:
    - "last week in AI"
    - "AI weekly roundup"
    - "site:substack.com AI news"
  viral:
