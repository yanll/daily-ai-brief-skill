# API数据源配置（暂时禁用，需要API密钥）
api_sources:
  - name: "GitHub Releases API"
    type: "github"
    endpoint: "https://api.github.com/repos/{owner}/{repo}/releases"
    params:
      per_page: 10
    enabled: false  # 暂时禁用，需要修复URL格式和认证
    priority: 2
    num_items: 5  # 该渠道默认采集条数

# 数据获取配置
fetch_config:
  # 通用配置
  max_items_per_source: 15
  timeout_seconds: 30
  user_agent: "AI-Daily-Brief/2.0 (+https://github.com/ai-daily-brief)"
  
  # 缓存配置 - 已禁用，确保每次都取最新数据
  cache_enabled: false
  cache_ttl_minutes: 0  # 无缓存
  cache_dir: "./cache"
  
  # 重试配置
  max_retries: 2
  retry_delay_seconds: 2
  
  # 内容过滤
  min_content_length: 30
  max_content_length: 500
  exclude_keywords:
    - "sponsored"
    - "advertisement"
    - "click here"
    - "buy now"
    - "广告"
    - "推广"
  
  # 语言配置
  preferred_languages:
    - "zh"
    - "en"
  
  # 时间范围 (小时)
  max_age_hours: 72  # 3天内的新闻

# 分类映射配置（基于用户提供的分类）
category_mapping:
  # 关键词到分类的映射
  keywords_to_categories:
    - keywords: ["模型", "model", "gpt", "claude", "llama", "gemini", "参数", "SenseNova", "混元", "Ring"]
      category: "模型发布/更新"
      
    - keywords: ["产品", "product", "工具", "tool", "平台", "platform", "开源", "open source", "Claude Code", "Agent", "视频引擎"]
      category: "产品发布/更新"
      
    - keywords: ["行业", "industry", "动态", "ipo", "估值", "融资", "竞争", "基础设施", "会议", "团队"]
      category: "行业动态"
      
    - keywords: ["研究", "research", "论文", "paper", "学术", "academic", "框架", "强化学习", "MLLM", "描述"]
      category: "论文研究"
      
    - keywords: ["技巧", "tip", "观点", "view", "教程", "tutorial", "交互", "界面", "shebang", "知识产权"]
      category: "技巧与观点"
      
    - keywords: ["芯片", "硬件", "cerebras", "gpu", "tpu", "处理器"]
      category: "硬件动态"

# 数据源优先级配置
source_priority:
  # 按类型优先级
  type_priority:
    - "rss"      # RSS源最可靠
    - "api"      # API次之
    - "web"      # 网页爬虫最后
  
  # 按可信度权重
  credibility_weights:
    "official": 1.0      # 官方渠道
    "tech_media": 0.8    # 技术媒体
    "social_media": 0.6  # 社交媒体
    "personal_blog": 0.5 # 个人博客
  
  # 渠道可信度映射
  channel_credibility:
    "openai.com": "official"
    "anthropic.com": "official"
    "claude.com": "official"
    "apple.com": "official"
    "ithome.com": "tech_media"
    "github.com": "tech_media"
    "simonwillison.net": "personal_blog"
    "x.com": "social_media"
    "twitter.com": "social_media"



# 数据验证配置
data_validation:
  enabled: true
  
  # 必填字段验证
  required_fields:
    - "title"
    - "source"
    - "category"
  
  # 字段长度验证
  field_length_limits:
    title:
      min: 5
      max: 200
    description:
      min: 20
      max: 1000
  
  # 链接验证
  validate_links: true
  allowed_domains:
    - "openai.com"
    - "anthropic.com"
    - "claude.com"
    - "apple.com"
    - "ithome.com"
    - "github.com"
    - "simonwillison.net"
    - "x.com"
    - "twitter.com"
    - "machinelearning.apple.com"